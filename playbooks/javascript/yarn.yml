---
- name: Install yarn
  hosts: all
  gather_facts: False
  tags: javascript,yarn
  tasks:
    - name: Find mise binary path
      shell: command -v mise || echo ~/.local/bin/mise
      register: mise_path
      changed_when: false
    - name: Install latest yarn with mise
      shell: "{{ mise_path.stdout }} install yarn@latest"
      register: mise_install
      changed_when: "'installed' in mise_install.stdout or 'installing' in mise_install.stdout"
    - name: Set latest yarn as global default
      shell: "{{ mise_path.stdout }} use --global yarn@latest"
    - name: Allow idiomatic yarn usage
      shell: "{{ mise_path.stdout }} settings add idiomatic_version_file_enable_tools yarn"
      changed_when: false
