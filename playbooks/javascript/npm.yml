---
- name: Install npm
  hosts: all
  gather_facts: False
  tags: javascript,npm
  tasks:
    - name: Find mise binary path
      shell: command -v mise || echo ~/.local/bin/mise
      register: mise_path
      changed_when: false
    - name: Install latest node with mise (includes npm)
      shell: "{{ mise_path.stdout }} install node@latest"
      register: mise_install
      changed_when: "'installed' in mise_install.stdout or 'installing' in mise_install.stdout"
    - name: Set latest node as global default
      shell: "{{ mise_path.stdout }} use --global node@latest"
    - name: Allow idiomatic node usage
      shell: "{{ mise_path.stdout }} settings add idiomatic_version_file_enable_tools node"
      changed_when: false
