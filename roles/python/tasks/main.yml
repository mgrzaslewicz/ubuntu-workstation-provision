- name: Find mise binary path
  shell: command -v mise || echo ~/.local/bin/mise
  register: mise_path
  changed_when: false
- name: Install python with mise
  shell: "{{ mise_path.stdout }} install python"
  register: mise_install
  changed_when: "'installed' in mise_install.stdout or 'installing' in mise_install.stdout"
- name: Set latest python as global default
  shell: "{{ mise_path.stdout }} use --global python"
- name: Allow idiomatic python usage
  shell: "{{ mise_path.stdout }} settings add idiomatic_version_file_enable_tools python"
  changed_when: false
