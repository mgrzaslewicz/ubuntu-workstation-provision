- name: Install bat
  become: true
  apt:
    name: bat
- name: Install broot
  get_url:
    url: https://dystroy.org/broot/download/x86_64-linux/broot
    dest: /tmp/broot
    mode: 0755
    timeout: 30
- name: Copy broot to /usr/local/bin
  become: true
  copy:
    src: /tmp/broot
    dest: /usr/local/bin/broot
    mode: 0755
- name: Install crudini
  become: true
  apt:
    name: crudini
- name: Install csvlens
  shell: "curl -sL https://raw.githubusercontent.com/YS-L/csvlens/main/install.sh | sh"
- name: Install delta
  become: true
  apt:
    name: git-delta
- name: Install fd-find
  become: true
  apt:
    name: fd-find
- name: Install firejail
  become: true
  apt:
    name: firejail
- name: Install fzf
  become: true
  apt:
