- name: Install imagemagick
  become: true
  apt:
    name: imagemagick
- name: Install lsd
  become: true
  apt:
    name: lsd
- name: Install mcfly
  shell: "curl -sL https://raw.githubusercontent.com/cantino/mcfly/master/ci/install.sh | sh -s -- --force"
- name: Setup mcfly in zsh
  lineinfile:
    path: "~/.zshrc"
    line: 'eval "$(mcfly init zsh)"'
    state: present
- name: Install nmap
  become: true
  apt:
    name: nmap
- name: Install postman
